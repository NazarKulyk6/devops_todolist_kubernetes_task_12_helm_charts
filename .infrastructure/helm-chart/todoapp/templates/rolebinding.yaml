apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Chart.Name }}-{{ .Values.rbac.roleName }}-binding
  namespace: {{ .Values.namespaceName | default .Chart.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "todoapp.serviceAccountName" . }}
    namespace: {{ .Values.namespaceName | default .Chart.Name }}
roleRef:
  kind: Role
  name: {{ .Chart.Name }}-{{ .Values.rbac.roleName }}
  apiGroup: rbac.authorization.k8s.io

