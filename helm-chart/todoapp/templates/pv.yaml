apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "todoapp.pvName" . }}
spec:
  storageClassName: {{ .Values.pv.storageClassName }}
  persistentVolumeReclaimPolicy: Delete
  accessModes:
    - ReadWriteMany
  capacity:
    storage: {{ .Values.pv.capacity }}
  hostPath:
    path: {{ .Values.pv.hostPath }}

